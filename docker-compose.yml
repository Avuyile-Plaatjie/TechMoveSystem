services:
  sql-server-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sql-server-db
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "Your_strong_password123"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql
    networks:
      - techmove-network

  gims-backend-api:
    build:
      context: .
      dockerfile: TechMoveSystem.Api/Dockerfile
    container_name: gims-backend-api
    depends_on:
      - sql-server-db
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ConnectionStrings__DefaultConnection: "Server=sql-server-db,1433;Database=TechMoveDb;User Id=sa;Password=Your_strong_password123;TrustServerCertificate=True;MultipleActiveResultSets=true"
      Jwt__Key: "CHANGE_THIS_DEVELOPMENT_KEY_1234567890"
      Jwt__Issuer: "TechMoveSystem.Api"
      Jwt__Audience: "TechMoveSystem.Mvc"
      ApiClient__ClientId: "mvc-client"
      ApiClient__ClientSecret: "mvc-secret"
    ports:
      - "5001:8080"
    networks:
      - techmove-network

  gims-frontend-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gims-frontend-web
    depends_on:
      - gims-backend-api
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      Api__BaseUrl: "http://gims-backend-api:8080/"
      Api__ClientId: "mvc-client"
      Api__ClientSecret: "mvc-secret"
    ports:
      - "5000:8080"
    networks:
      - techmove-network

volumes:
  sql_data:

networks:
  techmove-network:
    driver: bridge
